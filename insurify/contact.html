<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact | Insurify Claims</title>
    <meta name="description" content="Insurify - Smart Claims Management Made Simple. Fast, transparent, and reliable." />
    <meta name="keywords" content="insurance, claims, coverage, auto insurance, home insurance, health, business" />
    <meta property="og:title" content="Insurify Claims Management" />
    <meta property="og:description" content="Compare, choose, and manage insurance with confidence." />
    <meta property="og:type" content="website" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="insurify_logo.png" />
    <link rel="stylesheet" href="insurance.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .fade-in { animation: fadeIn 1.2s ease; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: none; } }
      .card-hover:hover { box-shadow: 0 10px 32px rgba(37,99,235,0.15); transform: translateY(-4px) scale(1.03); transition: all 0.3s cubic-bezier(.4,2,.6,1); }
    </style>
  </head>
  <body class="bg-gray-50">
    <!-- HEADER -->
    <header class="bg-blue-900 text-white relative">
      <div class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Insurify Claims Logo" class="w-10 h-10 bg-white rounded-full p-1" />
          <h1 class="text-2xl font-bold">Insurify Claims</h1>
        </div>
        <nav class="space-x-6 hidden md:block">
          <a href="about.html" class="hover:text-blue-300">About</a>
          <a href="services.html" class="hover:text-blue-300">Services</a>
          <a href="coverage.html" class="hover:text-blue-300">Coverage</a>
          <a href="claims.html" class="hover:text-blue-300">Claims</a>
          <a href="report.html" class="hover:text-blue-300">Submit Claim</a>
          <a href="contact.html" class="hover:text-blue-300">Contact</a>
        </nav>
        <div class="md:hidden flex items-center">
          <button id="menu-btn" class="text-white focus:outline-none" onclick="document.getElementById('mobile-nav').classList.toggle('hidden')">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
      <div id="mobile-nav" class="md:hidden fixed left-0 right-0 top-0 mt-20 bg-blue-900 text-white px-6 py-4 space-y-2 hidden z-50 shadow-lg">
        <a href="about.html" class="block hover:text-blue-300">About</a>
        <a href="services.html" class="block hover:text-blue-300">Services</a>
        <a href="coverage.html" class="block hover:text-blue-300">Coverage</a>
        <a href="claims.html" class="block hover:text-blue-300">Claims</a>
        <a href="report.html" class="block hover:text-blue-300">Submit Claim</a>
        <a href="contact.html" class="block hover:text-blue-300">Contact</a>
      </div>
    </header>
    </header>
    <main class="py-16">
      <div class="max-w-4xl mx-auto px-6 fade-in">
        <div class="mb-8 text-center">
          <a href="index.html" class="inline-block bg-blue-900 text-white px-6 py-3 rounded-lg font-semibold shadow hover:bg-blue-700 transition-all duration-300">← Back to Home</a>
        </div>
        <h2 class="text-4xl md:text-5xl font-extrabold mb-6 text-center bg-gradient-to-r from-blue-700 to-blue-400 bg-clip-text text-transparent animate-pulse">Contact Us</h2>
        <form class="bg-white p-10 rounded-2xl shadow-xl card-hover space-y-6 max-w-xl mx-auto transition-all duration-300">
          <div>
            <label class="block font-medium">Name</label>
            <input type="text" class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all duration-300" placeholder="Your name" />
          </div>
          <div>
            <label class="block font-medium">Email</label>
            <input type="email" class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all duration-300" placeholder="you@example.com" />
          </div>
          <div>
            <label class="block font-medium">Message</label>
            <textarea rows="4" class="w-full mt-1 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all duration-300" placeholder="How can we help?"></textarea>
          </div>
          <button type="submit" class="w-full bg-blue-900 text-white py-3 rounded-lg font-semibold hover:bg-blue-800 transition-all duration-300">Send Message</button>
        </form>
      </div>
    </main>
    <footer class="bg-gray-900 text-gray-400 py-6 text-center mt-16">
      <span class="animate-pulse">© 2013-2026 Insurify Claims. All rights reserved.</span>
      <div class="mt-4">
        <a href="index.html" class="inline-block bg-blue-900 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-800 transition">Back to Home</a>
      </div>
    </footer>

</html>
